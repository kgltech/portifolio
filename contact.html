  <main class="container">
    <h1>Contact</h1>
    <p>I'd love to hear about your needs. Use the form below or email me directly.</p>

    <form id="contactForm">
      <label>Name <input type="text" id="name" required></label>
      <label>Email <input type="email" id="email" required></label>
      <label>Message <textarea id="message" rows="6" required></textarea></label>
      <button type="submit" class="btn">Send Message</button>
    </form>

    <p class="muted">Or email: <a href="mailto:teacher@example.com">teacher@example.com</a></p>
  </main>
